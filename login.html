<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Zap Esfirras</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div class="container-autenticacao">
        <div class="coluna-visual">
            <div class="overlay-visual"></div>
            <div class="conteudo-visual">
                <img src="assets/zapesfiiras.png" alt="Logo Zap Esfirras" class="logo-visual">
                <h1>O sabor que conecta você.</h1>
                <p>Faça login para acessar promoções exclusivas e pedir suas esfirras favoritas em segundos.</p>
            </div>
        </div>

        <div class="coluna-formulario">
            <div class="conteudo-formulario">
                <a href="index.html" class="link-voltar">
                    <ion-icon name="arrow-back-outline"></ion-icon>
                    <span>Voltar ao Início</span>
                </a>
                <h2>Bem-vindo de volta!</h2>
                <p>Entre com suas credenciais para continuar.</p>

                <form id="formulario-login">
                    <div class="grupo-campo">
                        <label for="email"><ion-icon name="mail-outline"></ion-icon></label>
                        <input type="email" id="email" name="email" placeholder="Seu e-mail" required>
                    </div>
                    <div class="grupo-campo">
                        <label for="senha"><ion-icon name="lock-closed-outline"></ion-icon></label>
                        <input type="password" id="senha" name="senha" placeholder="Sua senha" required>
                    </div>
                    <div class="opcoes-extras">
                        <a href="#" class="link-esqueci-senha">Esqueceu a senha?</a>
                    </div>
                    <button type="submit" class="botao-principal">Entrar na Conta</button>
                </form>

                <div class="separador">
                    <span>OU ENTRE COM</span>
                </div>

                <div class="social-login">
                    <button class="botao-social botao-google">
                        <ion-icon name="logo-google"></ion-icon>
                        <span>Google</span>
                    </button>
                    <button class="botao-social botao-facebook">
                        <ion-icon name="logo-facebook"></ion-icon>
                        <span>Facebook</span>
                    </button>
                </div>

                <div class="link-mudar-form">
                    <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se agora</a></p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>
</html>
